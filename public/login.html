<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="css/pages.css">
  <link rel="icon" sizes="192x192" href="https://static.wixstatic.com/media/c4bee6_f6158e93a0c04c8f9eeaba387e610940%7Emv2.png/v1/fill/w_192%2Ch_192%2Clg_1%2Cusm_0.66_1.00_0.01/c4bee6_f6158e93a0c04c8f9eeaba387e610940%7Emv2.png" type="image/png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

body {
  margin: 0;
  height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: "Poppins", Arial, sans-serif;
  color: #ffffff;
  overflow: hidden;

  background:
    radial-gradient(circle at center, rgba(0, 217, 255, 0.08), transparent 60%),
    radial-gradient(circle at 20% 80%, rgba(0, 255, 179, 0.06), transparent 70%),
    linear-gradient(135deg, #0a0c10, #11151c, #0d1117);
}


/*  Efeito de brilho suave animado */
body::before {
  content: "";
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: radial-gradient(circle at 30% 30%, rgba(255, 0, 204, 0.056), transparent 70%);
  animation: moveLight 8s infinite alternate ease-in-out;
  pointer-events: none;
}

@keyframes moveLight {
  0% { transform: translate(0, 0); opacity: 0.3; }
  100% { transform: translate(40px, 40px); opacity: 0.6; }
}

/* 📱 Responsividade */
@media (max-width: 768px) {
  body {
    background-position: center;
    background-attachment: scroll;
  }
}


    #login-page {
      background: rgb(255, 255, 255);
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.481);
      text-align: center;
      width: 300px;
    }

    h2 {
      margin-bottom: 20px;
      color: #128C7E;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 2px solid #ddd;
      border-radius: 5px;
      transition: 0.3s;
      font-size: 16px;
    }

    input:focus {
      border-color: #128C7E;
      outline: none;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #25D366;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      transition: 0.3s;
    }

    button:hover {
      background: #1eb14f;
    }

    .back-btn {
      background-color: red;
    }

    .back-btn:hover {
      background-color: darkred;
    }
  </style>
</head>
<body>
<!--
   <div id="loading">
    <div class="spinner"></div>
    Carregando...
  </div>
-->
  <div id="login-page">
    <h2>Entrar com Google</h2>
    <!-- Botão Voltar -->
    <button id="back-btn" class="back-btn" onclick="window.location.href='index.html'">Voltar</button>
    
    <!-- Botão de Login com Google -->
    <button id="google-login">Entrar com Google</button>
  </div>

 <div id="username-setup" style="display: none; margin-top: 20px;">
  <input type="text" id="username-input" placeholder="Escolha um nome de usuário">
  <button id="save-username">Salvar Nome</button>
</div>

  <script type="module">
    import { loginWithGoogle } from "./js/main.js";
    document.getElementById("google-login").addEventListener("click", loginWithGoogle);
  </script>
  <script type="module" src="js/script.js"></script>
</body>
</html>
