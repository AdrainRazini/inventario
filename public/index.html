  <!-- Estilo do botão lateral do WhatsApp -->
  <style>
   .side-tab {
  position: fixed;
  top: 50%;
  right: 0;
  transform: translateY(-50%);
  width: 50px;
  height: 50px;
  background-color: #25d366;
  color: white;
  border-radius: 8px 0 0 8px;
  cursor: pointer;
  box-shadow: 0 0 8px rgba(0, 0, 0, 0.3);
  transition: width 0.3s ease, height 0.3s ease, padding 0.3s ease;
  overflow: hidden;
  font-family: Arial, sans-serif;
  display: flex;
  align-items: center;
}

.side-tab.open {
  width: 260px;
  height: auto;
  padding: 10px;
}

.side-tab .icon {
  font-size: 28px;
  width: 50px;
  height: 50px;
  text-align: center;
  line-height: 50px;
  flex-shrink: 0;
}

.side-tab .content {
  margin-left: 10px;
  opacity: 0;
  white-space: nowrap;
  transition: opacity 0.3s ease 0.3s;
  pointer-events: none;
  user-select: none;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.side-tab.open .content {
  opacity: 1;
  pointer-events: auto;
}


.search-bar {
  margin: 20px 0;
  text-align: center;
}

#search-input {
  width: 90%;
  max-width: 500px;
  padding: 10px;
  font-size: 16px;
  border: 2px solid var(--color-primary-dark);
  border-radius: 8px;
  outline: none;
}


#user {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  cursor: pointer;
  transition: transform 0.2s ease;
}

#user:hover {
  transform: scale(1.05);
}

#login-button {
  padding: 6px 12px;
  border: none;
  border-radius: 6px;
  background-color: #25d366;
  color: white;
  cursor: pointer;
  transition: background-color 0.3s;
}

#login-button:hover {
  background-color: #1da851;
}

  </style>

<body>
  <!-- Header / Navegação -->
  <header>
    <nav>
   <div>
  <img id="user" src="image/anonimo.png" alt="Foto do usuário" />
  <span id="username-display"></span>
  <button id="login-button"></button>
</div>

<script>
  const userImg = document.getElementById('user');
  const loginBtn = document.getElementById('login-button');

  const userPhoto = localStorage.getItem('userphoto');
  const userName = localStorage.getItem('username');

  const fotoPadrao = 'image/anonimo.png';
  userImg.src = userPhoto && userPhoto !== '' ? userPhoto : fotoPadrao;

  // Atualiza nome do usuário e botão dinamicamente
  if (userName) {
    document.getElementById('username-display').textContent = userName;
    loginBtn.textContent = 'Sair';
    loginBtn.onclick = sair;
  } else {
    loginBtn.textContent = 'Entrar';
    loginBtn.onclick = () => window.location.href = 'login.html';
  }

  // Clique na foto redireciona dependendo do login
  userImg.addEventListener('click', () => {
    const destino = userName ? 'user-dashboard.html' : 'login.html';
    window.location.href = destino;
  });

  // Função de logout
  function sair() {
    localStorage.removeItem('username');
    localStorage.removeItem('useremail');
    localStorage.removeItem('userphoto');
    // localStorage.removeItem('firebase_token'); // se usar token depois

    window.location.reload(); // recarrega para aplicar as mudanças
  }
</script>

  <!-- Scripts -->
  <script type="module" src="js/script.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
  <script>
    AOS.init();

    async function fetchInventario() {
      try {
        const response = await fetch('/inventario');
        if (!response.ok) throw new Error('Erro na resposta da rede');
        return await response.json();
      } catch (error) {
        console.error(error);
        const loading = document.getElementById('loading');
        loading.innerText = 'Erro ao carregar o inventário. Tente novamente mais tarde.';
        return null;
      }
    }

  let inventarioOriginal = [];

function populateCards(data) {
  const container = document.getElementById('inventario-cards');
  const loading = document.getElementById('loading');
  loading.style.display = 'none';
  container.style.display = 'grid';

  inventarioOriginal = data; // Salva os dados brutos para pesquisa
  renderCards(data);
}

function renderCards(data) {
  const container = document.getElementById('inventario-cards');
  container.innerHTML = '';

  if (!data || data.length === 0) {
    container.innerHTML = '<p style="grid-column: 1/-1; text-align:center;">Nenhum item encontrado.</p>';
    return;
  }

  data.forEach(item => {
    const card = document.createElement('div');
    card.classList.add('card');
    card.innerHTML = `
      <h3>ID: ${item.id || "Não disponível"}</h3>
      <p><strong>Transportadora:</strong> ${item.transportadora?.nome || "Não disponível"}</p>
      <p><strong>Cliente:</strong> ${item.cliente?.nome || "Não disponível"}</p>
      <p><strong>Origem:</strong> ${item.origem || "Não disponível"}</p>
      <p><strong>Destino:</strong> ${item.destino || "Não disponível"}</p>
      <p><strong>Valor Total:</strong> R$ ${item.valor_total_declarado?.toFixed(2) || "Não disponível"}</p>
      <p><strong>Data:</strong> ${item.data_local ? item.data_local.split('T')[0] : "Não disponível"}</p>
      <button onclick="verDocumento('${item.id}')">Ver Documento</button>
    `;
    container.appendChild(card);
  });
}

// Função de filtro
document.addEventListener('DOMContentLoaded', () => {
  const searchInput = document.getElementById('search-input');
  if (searchInput) {
    searchInput.addEventListener('input', () => {
      const termo = searchInput.value.toLowerCase();
      const filtrados = inventarioOriginal.filter(item => {
        return (
          (item.id && item.id.toString().includes(termo)) ||
          (item.cliente?.nome && item.cliente.nome.toLowerCase().includes(termo)) ||
          (item.transportadora?.nome && item.transportadora.nome.toLowerCase().includes(termo)) ||
          (item.origem && item.origem.toLowerCase().includes(termo)) ||
          (item.destino && item.destino.toLowerCase().includes(termo))
        );
      });
      renderCards(filtrados);
    });
  }
});

    function verDocumento(itemId) {
      window.location.href = `verdocumento_separado.html?itemId=${itemId}`;
    }

    // Inicia o carregamento dos dados
    window.addEventListener('DOMContentLoaded', async () => {
      const data = await fetchInventario();
      if (data) populateCards(data);
    });


        function toggleMenu() {
            document.querySelector(".nav-links").classList.toggle("active");
        }

  </script>
