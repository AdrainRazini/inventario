<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Central do Usuário</title>
  <link rel="stylesheet" href="css/page.css">
<link rel="icon" sizes="192x192" href="https://static.wixstatic.com/media/c4bee6_f6158e93a0c04c8f9eeaba387e610940%7Emv2.png/v1/fill/w_192%2Ch_192%2Clg_1%2Cusm_0.66_1.00_0.01/c4bee6_f6158e93a0c04c8f9eeaba387e610940%7Emv2.png" type="image/png">
  <style>
     body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f9f9f9;
    }

    header, main, footer {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
    }

    #dashboard {
      text-align: center;
      background-color: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .user-info {
      margin-bottom: 20px;
      text-align: left;
    }

    .user-info p {
      margin: 10px 0;
    }

    button {
      padding: 10px 20px;
      font-size: 1rem;
      border: none;
      background-color: #007BFF;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #0056b3;
    }
    /* Seu CSS já existente */
     #dashboard {
      text-align: center;
      background-color: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    #user-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
 <main>
    <section id="dashboard" aria-label="Informações do Usuário">
      <img id="user-avatar" src="image/anonimo.png" alt="Foto de perfil do usuário" />
      <div class="user-info">
        <p><strong>Nome:</strong> <span id="user-name">Carregando...</span></p>
        <p><strong>Email:</strong> <span id="user-email">Carregando...</span></p>
      </div>
      <button onclick="voltar()">Voltar</button>
    </section>
  </main>


  <script>
    // Verifica se o usuário está logado (dados de nome e email no localStorage)
    const nome = localStorage.getItem('username');
    const email = localStorage.getItem('useremail');

    if (!nome || !email) {
      // Se não houver nome ou email no localStorage, redireciona para a página de login
      window.location.href = 'login.html';
    } else {
      // Caso o usuário esteja logado, exibe as informações na página
      document.getElementById('user-name').innerText = nome;
      document.getElementById('user-email').innerText = email;

      // Recupera a foto do perfil do usuário
      const userPhoto = localStorage.getItem('userphoto');
      if (userPhoto) {
        document.getElementById('user-avatar').src = userPhoto;  // Exibe a foto
      }
    }

    function voltar() {
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
